<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
<title>SpinCore</title>
<style>
*{box-sizing:border-box}
:root{
  --glass:rgba(255,255,255,.1);
  --line:rgba(255,255,255,.16);
  --hot:#ff7a18;
  --blue:#74d7ff;
}
body{
  margin:0;
  overflow:hidden;
  min-height:100vh;
  color:white;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 50% 20%,#243b7a 0%,transparent 35%),
    radial-gradient(circle at 80% 85%,#431d69 0%,transparent 32%),
    linear-gradient(160deg,#050713,#101a35 60%,#070a14);
  touch-action:none;
}
canvas{display:block}
.top{
  position:fixed;
  top:14px;
  left:14px;
  right:14px;
  z-index:10;
  display:flex;
  justify-content:space-between;
  gap:10px;
  pointer-events:none;
}
.card{
  pointer-events:auto;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:22px;
  background:rgba(8,12,24,.48);
  backdrop-filter:blur(18px);
  box-shadow:0 18px 50px rgba(0,0,0,.28);
}
h1{font-size:17px;margin:0}
.small{font-size:12px;opacity:.68;margin-top:2px}
.stat{
  text-align:right;
  min-width:110px;
}
.big{
  font-size:24px;
  font-weight:900;
  letter-spacing:-.04em;
}
.bottom{
  position:fixed;
  left:14px;
  right:14px;
  bottom:14px;
  z-index:10;
  padding:13px;
  display:grid;
  gap:10px;
  border:1px solid var(--line);
  border-radius:26px;
  background:rgba(8,12,24,.58);
  backdrop-filter:blur(18px);
}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 13px;
  background:var(--glass);
  color:white;
  font-weight:800;
  cursor:pointer;
}
button.active{
  background:white;
  color:#111827;
}
button:active{transform:scale(.94)}
.meter{
  height:9px;
  border-radius:99px;
  overflow:hidden;
  background:rgba(255,255,255,.1);
}
.fill{
  height:100%;
  width:0%;
  border-radius:99px;
  background:linear-gradient(90deg,var(--blue),#a78bfa,var(--hot));
  transition:width .08s linear;
}
.toast{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) scale(.92);
  z-index:20;
  font-size:30px;
  font-weight:1000;
  opacity:0;
  pointer-events:none;
  text-shadow:0 10px 40px rgba(0,0,0,.6);
}
.toast.show{
  animation:pop .7s ease;
}
@keyframes pop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.75)}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}
  100%{opacity:0;transform:translate(-50%,-58%) scale(1)}
}
@media(min-width:760px){
  .bottom{
    left:50%;
    right:auto;
    transform:translateX(-50%);
    width:720px;
  }
}
</style>
</head>
<body>

<div class="top">
  <div class="card">
    <h1>SpinCore</h1>
    <div class="small">Flick hard. Hold flow. Unlock feel.</div>
  </div>
  <div class="card stat">
    <div class="small">RPM</div>
    <div class="big" id="rpm">0</div>
  </div>
</div>

<div class="toast" id="toast">Perfect Flick</div>

<div class="bottom">
  <div class="meter"><div class="fill" id="fill"></div></div>
  <div class="row" id="balls">
    <button class="active" data-ball="glass">Glass</button>
    <button data-ball="chrome">Chrome</button>
    <button data-ball="lava">Lava</button>
    <button data-ball="void">Void</button>
    <button data-ball="gel">Gel</button>
  </div>
  <div class="row" id="modes">
    <button class="active" data-mode="smooth">Smooth</button>
    <button data-mode="heavy">Heavy</button>
    <button data-mode="ice">Ice</button>
    <button data-mode="wild">Wild</button>
  </div>
  <div class="row">
    <button id="boost">Impulse</button>
    <button id="brake">Brake</button>
    <button id="reset">Reset</button>
  </div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,100);
camera.position.set(0,0,4.4);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.25;
document.body.appendChild(renderer.domElement);

const group=new THREE.Group();
scene.add(group);

const geo=new THREE.SphereGeometry(1,128,128);

const materials={
  glass:new THREE.MeshPhysicalMaterial({
    color:0x71d7ff,metalness:.04,roughness:.05,
    transmission:.35,thickness:.9,clearcoat:1,clearcoatRoughness:.03
  }),
  chrome:new THREE.MeshStandardMaterial({
    color:0xddeaff,metalness:1,roughness:.14
  }),
  lava:new THREE.MeshStandardMaterial({
    color:0xff5a1f,emissive:0x661400,emissiveIntensity:.65,
    metalness:.16,roughness:.28
  }),
  void:new THREE.MeshStandardMaterial({
    color:0x090914,emissive:0x160044,emissiveIntensity:.7,
    metalness:.7,roughness:.2
  }),
  gel:new THREE.MeshPhysicalMaterial({
    color:0xb6ff8a,metalness:.02,roughness:.12,
    transmission:.18,clearcoat:1,clearcoatRoughness:.08
  })
};

const ball=new THREE.Mesh(geo,materials.glass);
group.add(ball);

const wire=new THREE.Mesh(
  geo,
  new THREE.MeshBasicMaterial({color:0xffffff,wireframe:true,transparent:true,opacity:.08})
);
group.add(wire);

const glow=new THREE.Mesh(
  new THREE.SphereGeometry(1.09,64,64),
  new THREE.MeshBasicMaterial({color:0x71d7ff,transparent:true,opacity:.09})
);
group.add(glow);

const floor=new THREE.Mesh(
  new THREE.CircleGeometry(1.35,80),
  new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.24})
);
floor.rotation.x=-Math.PI/2;
floor.position.y=-1.35;
floor.scale.y=.22;
scene.add(floor);

const stars=new THREE.Group();
scene.add(stars);

for(let i=0;i<130;i++){
  const s=new THREE.Mesh(
    new THREE.SphereGeometry(.006+Math.random()*.015,8,8),
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.18+Math.random()*.4})
  );
  s.position.set(
    (Math.random()-.5)*8,
    (Math.random()-.5)*6,
    -2-Math.random()*5
  );
  stars.add(s);
}

const trailGeo=new THREE.BufferGeometry();
const trailCount=140;
const trailPositions=new Float32Array(trailCount*3);
trailGeo.setAttribute("position",new THREE.BufferAttribute(trailPositions,3));
const trail=new THREE.Points(
  trailGeo,
  new THREE.PointsMaterial({
    color:0x8bdcff,
    size:.035,
    transparent:true,
    opacity:.55,
    blending:THREE.AdditiveBlending
  })
);
scene.add(trail);

const particles=[];
const particleGeo=new THREE.SphereGeometry(.018,8,8);
for(let i=0;i<40;i++){
  const p=new THREE.Mesh(
    particleGeo,
    new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0})
  );
  p.userData={life:0,v:new THREE.Vector3()};
  scene.add(p);
  particles.push(p);
}

scene.add(new THREE.AmbientLight(0x7f8cff,.75));

const key=new THREE.DirectionalLight(0xffffff,3.1);
key.position.set(3.5,4,5);
scene.add(key);

const rim=new THREE.DirectionalLight(0x66d9ff,2.7);
rim.position.set(-4,2,-3);
scene.add(rim);

const warm=new THREE.PointLight(0xff8a35,2.4,7);
warm.position.set(-2.5,-1.5,2);
scene.add(warm);

let mode={
  friction:.992,
  sensitivity:.09,
  wobble:.08,
  weight:1
};

const modes={
  smooth:{friction:.992,sensitivity:.09,wobble:.08,weight:1},
  heavy:{friction:.986,sensitivity:.055,wobble:.035,weight:1.6},
  ice:{friction:.997,sensitivity:.075,wobble:.025,weight:.8},
  wild:{friction:.991,sensitivity:.13,wobble:.16,weight:.7}
};

let vx=.006;
let vy=.012;
let dragging=false;
let lastX=0,lastY=0,lastT=0;
let wobble=0;
let best=0;
let combo=0;
let ballType="glass";

const rpmEl=document.getElementById("rpm");
const fill=document.getElementById("fill");
const toast=document.getElementById("toast");

function setToast(text){
  toast.textContent=text;
  toast.classList.remove("show");
  void toast.offsetWidth;
  toast.classList.add("show");
}

function activate(parent,btn){
  parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function setBall(type){
  ballType=type;
  ball.material=materials[type];
  wire.material.opacity=type==="void"?.18:.08;
  glow.material.color.set(
    type==="lava"?0xff5a1f:
    type==="void"?0x8b5cf6:
    type==="gel"?0xb6ff8a:
    type==="chrome"?0xe0f2fe:
    0x71d7ff
  );
  trail.material.color.set(glow.material.color);
}

document.getElementById("balls").onclick=e=>{
  if(e.target.tagName!=="BUTTON")return;
  activate(e.currentTarget,e.target);
  setBall(e.target.dataset.ball);
};

document.getElementById("modes").onclick=e=>{
  if(e.target.tagName!=="BUTTON")return;
  activate(e.currentTarget,e.target);
  mode=modes[e.target.dataset.mode];
  setToast(e.target.textContent+" Mode");
};

addEventListener("pointerdown",e=>{
  dragging=true;
  lastX=e.clientX;
  lastY=e.clientY;
  lastT=performance.now();
});

addEventListener("pointermove",e=>{
  if(!dragging)return;

  const now=performance.now();
  const dt=Math.max(12,now-lastT);
  const dx=e.clientX-lastX;
  const dy=e.clientY-lastY;

  vx=(dy/dt)*mode.sensitivity/mode.weight;
  vy=(dx/dt)*mode.sensitivity/mode.weight;

  ball.rotation.x+=vx;
  ball.rotation.y+=vy;
  wire.rotation.copy(ball.rotation);

  const flick=Math.abs(dx)+Math.abs(dy);
  wobble=Math.min(.18,flick*.0025*mode.wobble*8);

  if(flick>55){
    spawnParticles(10);
  }

  lastX=e.clientX;
  lastY=e.clientY;
  lastT=now;
});

addEventListener("pointerup",()=>{
  dragging=false;
  const power=Math.abs(vx)+Math.abs(vy);
  if(power>.11){
    combo++;
    setToast(combo>2?`Combo x${combo}`:"Perfect Flick");
    pulseHaptic(25);
  }else{
    combo=Math.max(0,combo-1);
  }
});

document.getElementById("boost").onclick=()=>{
  vx+=(Math.random()-.5)*.18;
  vy+=(Math.random()>.5?1:-1)*.22;
  wobble=.16;
  spawnParticles(22);
  setToast("Impulse");
  pulseHaptic(35);
};

document.getElementById("brake").onclick=()=>{
  vx*=.18;
  vy*=.18;
  setToast("Brake");
  pulseHaptic(12);
};

document.getElementById("reset").onclick=()=>{
  vx=.006;
  vy=.012;
  wobble=0;
  combo=0;
  ball.rotation.set(0,0,0);
  wire.rotation.set(0,0,0);
  setToast("Reset");
};

function pulseHaptic(ms){
  if(navigator.vibrate) navigator.vibrate(ms);
}

function spawnParticles(n){
  for(let i=0;i<n;i++){
    const p=particles.find(x=>x.userData.life<=0);
    if(!p)return;
    p.position.set(
      (Math.random()-.5)*1.6,
      (Math.random()-.5)*1.6,
      .2
    );
    p.userData.v.set(
      (Math.random()-.5)*.035,
      (Math.random()-.5)*.035,
      (Math.random()-.5)*.02
    );
    p.userData.life=1;
    p.material.color.set(glow.material.color);
    p.material.opacity=.8;
  }
}

function updateParticles(){
  for(const p of particles){
    if(p.userData.life<=0)continue;
    p.position.add(p.userData.v);
    p.userData.life-=.025;
    p.material.opacity=p.userData.life*.7;
  }
}

function updateTrail(spin,t){
  for(let i=trailCount-1;i>0;i--){
    trailPositions[i*3]=trailPositions[(i-1)*3];
    trailPositions[i*3+1]=trailPositions[(i-1)*3+1];
    trailPositions[i*3+2]=trailPositions[(i-1)*3+2];
  }

  const r=1.15+spin*3;
  trailPositions[0]=Math.cos(t*.006)*r;
  trailPositions[1]=Math.sin(t*.005)*r*.65;
  trailPositions[2]=Math.sin(t*.004)*.4;

  trail.geometry.attributes.position.needsUpdate=true;
  trail.material.opacity=Math.min(.75,.12+spin*4);
}

function animate(t=0){
  requestAnimationFrame(animate);

  ball.rotation.x+=vx;
  ball.rotation.y+=vy;
  ball.rotation.z+=vy*.18;
  wire.rotation.copy(ball.rotation);

  vx*=dragging?.986:mode.friction;
  vy*=dragging?.986:mode.friction;

  const spin=Math.min(.18,Math.abs(vx)+Math.abs(vy));
  const rpm=Math.round(spin*6200);

  if(rpm>best && rpm>400){
    best=rpm;
    if(best>900) pulseHaptic(8);
  }

  rpmEl.textContent=rpm;
  fill.style.width=Math.min(100,rpm/18)+"%";

  if(rpm>1000 && Math.random()<.025) spawnParticles(1);

  const squash=1+spin*.75+wobble;
  const gelBonus=ballType==="gel"?Math.sin(t*.01)*wobble*.9:0;

  group.scale.set(
    1+gelBonus,
    squash,
    1-gelBonus*.4
  );

  group.rotation.z=Math.sin(t*.0015)*spin*2.2;
  glow.material.opacity=.07+spin*.9;
  floor.scale.x=1.1+spin*3;
  floor.material.opacity=.18+spin*1.2;

  key.position.x=Math.sin(t*.001)*4;
  key.position.y=3+Math.cos(t*.0012);
  warm.intensity=2+spin*10;

  stars.rotation.y+=.00035+spin*.006;
  stars.rotation.x+=.00015;

  updateTrail(spin,t);
  updateParticles();

  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
