<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Satisfying 3D Spin Ball</title>
<style>
:root{
  --bg1:#090d18;
  --bg2:#121b35;
  --glass:rgba(255,255,255,.1);
  --line:rgba(255,255,255,.16);
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:white;
  background:
    radial-gradient(circle at 50% 15%,#233b76 0%,transparent 38%),
    radial-gradient(circle at 20% 90%,#351c54 0%,transparent 34%),
    linear-gradient(145deg,var(--bg1),var(--bg2));
  touch-action:none;
}
canvas{display:block}
.ui{
  position:fixed;
  left:16px;
  right:16px;
  bottom:16px;
  z-index:10;
  display:grid;
  gap:12px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(8,12,24,.58);
  backdrop-filter:blur(18px);
  box-shadow:0 18px 50px rgba(0,0,0,.35);
}
.title{
  position:fixed;
  top:18px;
  left:18px;
  z-index:10;
  padding:12px 16px;
  border-radius:20px;
  background:rgba(8,12,24,.42);
  border:1px solid var(--line);
  backdrop-filter:blur(16px);
}
h1{font-size:18px;margin:0}
p{margin:3px 0 0;font-size:13px;opacity:.72}
.row{display:flex;gap:8px;flex-wrap:wrap}
button{
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 13px;
  color:white;
  background:var(--glass);
  font-weight:700;
  cursor:pointer;
}
button.active{
  background:white;
  color:#111827;
}
button:active{transform:scale(.96)}
.hint{
  font-size:12px;
  opacity:.62;
  text-align:center;
}
@media(min-width:700px){
  .ui{
    left:50%;
    right:auto;
    transform:translateX(-50%);
    width:min(680px,calc(100vw - 32px));
  }
}
</style>
</head>
<body>

<div class="title">
  <h1>Spin Ball</h1>
  <p>Drag. Flick. Let it roll.</p>
</div>

<div class="ui">
  <div class="row" id="balls">
    <button class="active" data-ball="glass">Glass</button>
    <button data-ball="chrome">Chrome</button>
    <button data-ball="earth">Topo</button>
    <button data-ball="lava">Lava</button>
    <button data-ball="grid">Grid</button>
  </div>

  <div class="row" id="speeds">
    <button data-speed=".55">Slow</button>
    <button class="active" data-speed="1">Smooth</button>
    <button data-speed="1.75">Fast</button>
    <button data-speed="3">Wild</button>
  </div>

  <div class="row">
    <button id="pulse">Impulse Spin</button>
    <button id="brake">Brake</button>
    <button id="reset">Reset</button>
  </div>

  <div class="hint">Best on phone: flick across the ball and release.</div>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  45,
  innerWidth / innerHeight,
  0.1,
  100
);
camera.position.set(0, 0, 4.2);

const renderer = new THREE.WebGLRenderer({
  antialias:true,
  alpha:true
});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;
document.body.appendChild(renderer.domElement);

const group = new THREE.Group();
scene.add(group);

const sphereGeo = new THREE.SphereGeometry(1, 96, 96);

const mats = {
  glass: new THREE.MeshPhysicalMaterial({
    color:0x78ccff,
    metalness:.05,
    roughness:.08,
    transmission:.35,
    thickness:.8,
    clearcoat:1,
    clearcoatRoughness:.04
  }),
  chrome: new THREE.MeshStandardMaterial({
    color:0xd9e6ff,
    metalness:1,
    roughness:.18
  }),
  earth: new THREE.MeshStandardMaterial({
    color:0x3ba76f,
    metalness:.08,
    roughness:.42
  }),
  lava: new THREE.MeshStandardMaterial({
    color:0xff5a1f,
    emissive:0x661100,
    emissiveIntensity:.45,
    roughness:.32,
    metalness:.15
  }),
  grid: new THREE.MeshStandardMaterial({
    color:0x7dd3fc,
    metalness:.2,
    roughness:.22
  })
};

let ball = new THREE.Mesh(sphereGeo, mats.glass);
group.add(ball);

const wire = new THREE.Mesh(
  sphereGeo,
  new THREE.MeshBasicMaterial({
    color:0xffffff,
    wireframe:true,
    transparent:true,
    opacity:.12
  })
);
group.add(wire);

const glow = new THREE.Mesh(
  new THREE.SphereGeometry(1.08,64,64),
  new THREE.MeshBasicMaterial({
    color:0x7dd3fc,
    transparent:true,
    opacity:.08
  })
);
group.add(glow);

const floor = new THREE.Mesh(
  new THREE.CircleGeometry(1.25,64),
  new THREE.MeshBasicMaterial({
    color:0x000000,
    transparent:true,
    opacity:.24
  })
);
floor.rotation.x = -Math.PI/2;
floor.position.y = -1.35;
floor.scale.y = .22;
scene.add(floor);

scene.add(new THREE.AmbientLight(0x8090ff, .8));

const key = new THREE.DirectionalLight(0xffffff, 3.2);
key.position.set(3,4,5);
scene.add(key);

const rim = new THREE.DirectionalLight(0x60a5fa, 2.5);
rim.position.set(-4,2,-3);
scene.add(rim);

const warm = new THREE.PointLight(0xff8a4c, 2.4, 7);
warm.position.set(-2.5,-1.5,2);
scene.add(warm);

let speedMult = 1;
let vx = .006;
let vy = .011;
let dragging = false;
let lastX = 0;
let lastY = 0;
let lastT = 0;
let wobble = 0;

function setBall(type){
  ball.material = mats[type];
  wire.visible = type === "grid" || type === "earth";
  wire.material.opacity = type === "grid" ? .22 : .1;
  glow.material.color.set(
    type === "lava" ? 0xff5a1f :
    type === "chrome" ? 0xdbeafe :
    0x7dd3fc
  );
}

function activate(parent, btn){
  parent.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

document.getElementById("balls").addEventListener("click", e=>{
  if(e.target.tagName !== "BUTTON") return;
  activate(e.currentTarget, e.target);
  setBall(e.target.dataset.ball);
});

document.getElementById("speeds").addEventListener("click", e=>{
  if(e.target.tagName !== "BUTTON") return;
  activate(e.currentTarget, e.target);
  speedMult = Number(e.target.dataset.speed);
});

addEventListener("pointerdown", e=>{
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  lastT = performance.now();
});

addEventListener("pointermove", e=>{
  if(!dragging) return;

  const now = performance.now();
  const dt = Math.max(16, now - lastT);
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  vx = (dy / dt) * .09 * speedMult;
  vy = (dx / dt) * .09 * speedMult;

  ball.rotation.x += vx;
  ball.rotation.y += vy;
  wire.rotation.copy(ball.rotation);

  wobble = Math.min(.12, Math.abs(dx + dy) * .002);

  lastX = e.clientX;
  lastY = e.clientY;
  lastT = now;
});

addEventListener("pointerup", ()=>{
  dragging = false;
});

document.getElementById("pulse").onclick = ()=>{
  vx += (Math.random() - .5) * .18 * speedMult;
  vy += (Math.random() > .5 ? 1 : -1) * .22 * speedMult;
  wobble = .12;
};

document.getElementById("brake").onclick = ()=>{
  vx *= .15;
  vy *= .15;
};

document.getElementById("reset").onclick = ()=>{
  ball.rotation.set(0,0,0);
  wire.rotation.set(0,0,0);
  vx = .006;
  vy = .011;
  wobble = 0;
};

function animate(){
  requestAnimationFrame(animate);

  ball.rotation.x += vx;
  ball.rotation.y += vy;
  wire.rotation.copy(ball.rotation);

  vx *= dragging ? .985 : .992;
  vy *= dragging ? .985 : .992;

  const spin = Math.min(.16, Math.abs(vx) + Math.abs(vy));
  const squash = 1 + spin * .9 + wobble;

  group.scale.set(
    1 + Math.sin(performance.now()*.006)*wobble,
    squash,
    1
  );

  wobble *= .94;

  group.rotation.z = Math.sin(performance.now()*.0015) * spin * 2;
  floor.scale.x = 1.1 + spin * 2;
  floor.material.opacity = .18 + spin;

  renderer.render(scene,camera);
}

animate();

addEventListener("resize", ()=>{
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
